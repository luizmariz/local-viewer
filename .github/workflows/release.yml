name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the GitHub Release and upload binaries

jobs:
  # ---- multi-arch Docker image → Docker Hub (:X.Y.Z and :latest) ----
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    if: github.repository == 'luizmariz/local-viewer'
    steps:
      - uses: actions/checkout@v4

      - name: Version from tag
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.v.outputs.version }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/local-viewer:${{ steps.v.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/local-viewer:latest

  # ---- cross-platform binaries → attached to the GitHub Release ----
  binaries:
    name: Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VER="${GITHUB_REF_NAME#v}"
          NAME="local-viewer"
          [ "$GOOS" = "windows" ] && NAME="local-viewer.exe"
          go build -trimpath -ldflags "-s -w -X main.Version=$VER" -o "$NAME" ./src
          OUT="local-viewer_${VER}_${GOOS}_${GOARCH}"
          if [ "$GOOS" = "windows" ]; then zip "$OUT.zip" "$NAME" README.md LICENSE; else tar czf "$OUT.tar.gz" "$NAME" README.md LICENSE; fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            local-viewer_*.tar.gz
            local-viewer_*.zip
          generate_release_notes: true
