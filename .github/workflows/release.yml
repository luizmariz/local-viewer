name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the GitHub Release and upload binaries

jobs:
  # ---- multi-arch Docker image → Docker Hub (:X.Y.Z and :latest) ----
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    if: github.repository == 'luizmariz/local-viewer'
    steps:
      - uses: actions/checkout@v4

      - name: Version from tag
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.v.outputs.version }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/local-viewer:${{ steps.v.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/local-viewer:latest

  # ---- cross-platform binaries (matrix) → uploaded as build artifacts ----
  binaries:
    name: Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VER="${GITHUB_REF_NAME#v}"
          NAME="local-viewer"
          [ "$GOOS" = "windows" ] && NAME="local-viewer.exe"
          go build -trimpath -ldflags "-s -w -X main.Version=$VER" -o "$NAME" ./src
          OUT="local-viewer_${VER}_${GOOS}_${GOARCH}"
          if [ "$GOOS" = "windows" ]; then zip "$OUT.zip" "$NAME" README.md LICENSE; else tar czf "$OUT.tar.gz" "$NAME" README.md LICENSE; fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            local-viewer_*.tar.gz
            local-viewer_*.zip
          retention-days: 1

  # ---- one authoritative release: human notes from CHANGELOG + every binary ----
  release:
    name: GitHub Release
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need all tags for the compare link

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Build release notes from CHANGELOG
        run: |
          VER="${GITHUB_REF_NAME#v}"
          {
            # the section for this version (everything under "## [X.Y.Z]" up to the next "## [")
            awk -v ver="$VER" '
              $0 ~ "^## \\[" ver "\\]" { grab=1; next }
              grab && /^## \[/ { exit }
              grab { print }
            ' CHANGELOG.md | sed '/./,$!d'
            echo
            echo '---'
            echo "**Docker:** \`docker run -d -p 8080:8080 -v /var/run/docker.sock:/var/run/docker.sock -v local-viewer-data:/data luizipsum/local-viewer:$VER\`"
            PREV="$(git tag --sort=-version:refname | awk -v cur="v$VER" '$0==cur{f=1;next} f{print;exit}')"
            if [ -n "$PREV" ]; then
              echo
              echo "**Full changelog:** https://github.com/luizmariz/local-viewer/compare/$PREV...v$VER"
            fi
          } > RELEASE_NOTES.md
          echo "----- release notes -----"; cat RELEASE_NOTES.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: dist/*
